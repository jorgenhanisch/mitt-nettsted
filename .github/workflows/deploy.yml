name: Deploy Hugo til GitHub Pages

on:
  push:
    branches:
      - main
  repository_dispatch:
    types: [sanity-deploy]

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Installer Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "latest"
          extended: true

      - name: Installer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

        - name: Hent innhold fra Sanity
        run: |
          npm install
          # Denne linjen sletter nå ALT i content-mappen før nye data hentes
          rm -rf content/*.md 
          node scripts/fetch-content.js

      - name: Bygg Hugo
        # Her legger vi til --cleanDestinationDir
        run: hugo --minify --gc --cleanDestinationDir
  
      - name: Deploy til GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          force_orphan: true